name = "doc-writer"
model = "devstral-small"

[model]
temperature = 0.2
thinking = "off"

enabled_tools = ["read", "grep", "write_file"]
disabled_tools = ["edit", "bash", "task", "ask_user_question", "web_fetch", "web_search"]

[tools.read]
permission = "always"

[tools.grep]
permission = "always"

[tools.write_file]
permission = "ask"

# Project-specific Vibe configuration for codemod_recipe
# This overrides user-level ~/.vibe/config.toml settings for this project

# Enable project-level agents
agent_paths = [
    ".vibe/agents",
]
enabled_agents = [
    "default",
    "plan",
    "codestral-coder",
    "code-reviewer",
    "test-writer",
    "doc-writer",
]

# Enable project-level skills
skill_paths = [".vibe/skills"]
enabled_skills = ["vibe", "agent-coordinator", "yaml-dsl"]

# Keep default agent as the coordinator (mistral-medium-3.5)
default_agent = "default"
# Note: active_model is set in user config to mistral-medium-3.5

[tools.write_file]
permission = "ask"

[tools.edit]
permission = "ask"

dslVersion: 2
id: add_counter_field
name: add_counter_field
description: Adds a field to a class

args:
  - name: file
    required: true
    inputKind: file
  - name: className
    required: true
    inputKind: symbol
  - name: field
    required: true
    inputKind: symbol

steps:
  - edit:
      path: "{{file}}"
      ops:
        - insert:
            query: |
              (class_declaration
                name: (identifier) @className
                body: (class_body
                  (class_member
                    (method_signature
                      (function_signature
                        name: (identifier) @methodName)))) @member
                (#eq? @className "{{className}}")
                (#eq? @methodName "update"))
            capture: member
            anchor: start
            text: "  final int {{$camel field}};\n\n"

postExecution:
  - dartFormat

dslVersion: 2
id: insert_log_line_scm
name: insert_log_line_scm
description: Insert a log line using an external .scm query file

args:
  - name: file
    required: true
    inputKind: file

steps:
  - edit:
      path: "{{file}}"
      ops:
        - insert:
            query: queries/settings_update_body.scm
            capture: body
            anchor: end
            text: "    print('codemod');\n"

postExecution:
  - dartFormat

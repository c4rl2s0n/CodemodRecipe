dslVersion: 2
id: add_log_line
name: add_log_line
description: Inserts a log line at the end of a method

args:
  - name: file
    required: true
    inputKind: file
  - name: className
    required: true
    inputKind: symbol
  - name: methodName
    required: true
    inputKind: symbol

steps:
  - edit:
      path: "{{file}}"
      ops:
        - insert:
            query: |
              (class_declaration
                name: (identifier) @className
                body: (class_body
                  (class_member
                    (method_signature
                      (function_signature
                        name: (identifier) @methodName))
                    (function_body
                      (block) @body)))
                (#eq? @className "{{className}}")
                (#eq? @methodName "{{methodName}}"))
            capture: body
            anchor: end
            text: "    print('codemod');\n"

postExecution:
  - dartFormat

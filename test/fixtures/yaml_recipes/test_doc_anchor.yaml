dslVersion: 1
id: test_doc_anchor
name: test_doc_anchor
description: Tests doc:before anchor

args:
  - name: file
    required: true
    inputKind: file

steps:
  - edit:
      path: "{{file}}"
      steps:
        - insert:
            at:
              - class: Settings
            anchor: doc:before
            text: |
              /// Auto-generated documentation

postExecution:
  - run: dart format .

dslVersion: 1
id: test_function_anchor
name: test_function_anchor
description: Tests function navigation with stmt:last anchor

args:
  - name: file
    required: true
    inputKind: file

steps:
  - edit:
      path: "{{file}}"
      steps:
        - insert:
            at:
              - function: build
            anchor: stmt:last
            text: |
              print('test');

postExecution:
  - dartFormat

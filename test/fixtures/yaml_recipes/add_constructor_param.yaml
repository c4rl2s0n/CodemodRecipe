dslVersion: 1
id: add_constructor_param
name: add_constructor_param
description: Adds a constructor parameter to a class

args:
  - name: file
    required: true
    inputKind: file
  - name: className
    required: true
    inputKind: symbol
  - name: param
    required: true
    inputKind: symbol

steps:
  - edit:
      path: "{{file}}"
      steps:
        - insert:
            at:
              - class: "{{className}}"
              - ctor: null
            anchor: param:last
            text: |
              , String {{$camel param}}

postExecution:
  - dartFormat
